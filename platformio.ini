[platformio]
build_dir = C:/Users/alison.tristao/.platformio/build_t_dongle

[env:tdongle-s3]
; esp32 --version
platform            = espressif32
board               = esp32-s3-devkitc-1
board_build.f_cpu   = 240000000L

; serial com
framework           = arduino
upload_speed        = 921600
monitor_speed       = 921600
upload_port         = COM5
monitor_port        = COM5

; compiler flag
build_unflags = 
    -std=gnu++11
    
build_flags =
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_RUNNING_CORE=1

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.10
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

board_build.flash_size = 16MB